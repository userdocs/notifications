name: Monitor Backport PRs

on:
  workflow_dispatch:
    inputs:
      force_recheck:
        description: "Clear seen PR list and re-notify all open backport PRs"
        type: boolean
        default: false
  schedule:
    - cron: "0 * * * *"

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Restore seen PRs cache
        uses: actions/cache/restore@v5
        with:
          path: seen_prs.txt
          key: seen-prs-cache
          restore-keys: seen-prs-

      - name: Fetch and check PRs
        id: fetch-prs
        run: |
          if [[ "${{ inputs.force_recheck }}" == "true" ]]; then
            echo "Force recheck requested, clearing seen PR list"
            > seen_prs.txt
          else
            touch seen_prs.txt
          fi
          > new_matches.txt

          PRS=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/qbittorrent/qBittorrent/pulls?state=open&per_page=100")

          echo "API response length: ${#PRS}"

          while IFS= read -r pr; do
            PR_NUMBER=$(echo "$pr" | jq -r '.number')
            PR_TITLE=$(echo "$pr" | jq -r '.title')
            PR_URL=$(echo "$pr" | jq -r '.html_url')

            echo "Checking PR #$PR_NUMBER: $PR_TITLE"

            if [[ "$PR_TITLE" =~ ^Backport[[:space:]]changes[[:space:]]to ]] &&
              ! grep -qx "$PR_NUMBER" seen_prs.txt; then
              echo "  -> New match, queuing notification"
              printf '%s|%s|%s\n' "$PR_NUMBER" "$PR_TITLE" "$PR_URL" >> new_matches.txt
            fi
          done < <(echo "$PRS" | jq -c '.[]')

          if [ -s new_matches.txt ]; then
            echo "MATCHED=true" >> "$GITHUB_ENV"
          else
            echo "MATCHED=false" >> "$GITHUB_ENV"
          fi

      - name: Send Pushover Notifications
        if: env.MATCHED == 'true'
        run: |
          while IFS='|' read -r number title url; do
            curl -s \
              --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
              --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
              --form-string "title=New Backport PR Detected" \
              --form-string "message=PR Title: $title" \
              --form-string "url=$url" \
              --form-string "url_title=View Pull Request on GitHub" \
              --form-string "sound=siren" \
              https://api.pushover.net/1/messages.json
          done < new_matches.txt

          # Mark notified PRs as seen by their PR number
          while IFS='|' read -r number title url; do
            echo "$number" >> seen_prs.txt
          done < new_matches.txt

      - name: Output summary
        if: env.MATCHED == 'true'
        run: |
          echo "## Backport PRs Notified" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | Title | Patch URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          while IFS='|' read -r number title url; do
            echo "| #${number} | ${title} | ${url}.patch |" >> "$GITHUB_STEP_SUMMARY"
          done < new_matches.txt

      - name: Save seen PRs cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: seen_prs.txt
          key: seen-prs-${{ github.run_id }}
